name: 中文指令终端

on:
  workflow_dispatch:
    inputs:
      command:
        description: '输入中文指令（例如：帮我建一个测试文件夹，里面放一个 hello.py）'
        required: true
        type: string

permissions:
  contents: write

jobs:
  execute:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 安装系统工具
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            curl wget vim nano tree htop \
            build-essential gdb strace ltrace \
            python3 python3-pip python3-venv \
            nodejs npm \
            netcat-openbsd dnsutils iputils-ping \
            jq unzip zip git

      - name: 运行自动安装脚本
        run: |
          if [ -f setup.sh ]; then
            bash setup.sh
          fi

      - name: AI 翻译中文指令为 Linux 命令
        id: translate
        run: |
          echo "用户输入: ${{ github.event.inputs.command }}"

          # 构建 prompt
          RESPONSE=$(curl -s https://apihub.agnes-ai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AGNES_API_KEY }}" \
            -d "$(jq -n \
              --arg msg "${{ github.event.inputs.command }}" \
              '{
                model: "agnes-2.0-flash",
                messages: [
                  {
                    role: "system",
                    content: "你是一个 Linux 命令翻译器。用户会用中文描述他想做的事情，你需要把它翻译成一系列可执行的 Linux bash 命令。\n\n规则：\n1. 只输出命令，不要解释，不要 markdown 代码块，不要多余文字\n2. 每行一条命令\n3. 命令要能在 Ubuntu 上直接运行\n4. 如果用户要创建文件，直接在这里写文件内容（用 cat heredoc 方式）\n5. 不要使用 sudo（已经是 root）\n6. 最后输出一行 echo 中文总结"
                  },
                  {
                    role: "user",
                    content: $msg
                  }
                ],
                temperature: 0.1,
                max_tokens: 2000
              }')")

          # 提取 AI 回复
          COMMANDS=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')
          echo "$COMMANDS" > /tmp/commands.sh
          echo "=== AI 生成的命令 ==="
          cat /tmp/commands.sh
          echo "====================="

      - name: 执行命令
        run: |
          echo "=== 开始执行命令 ==="
          bash /tmp/commands.sh
          echo "=== 命令执行完毕 ==="

      - name: 自动保存到仓库
        if: always()
        run: |
          git config user.email "sandbox@github.com"
          git config user.name "Sandbox Bot"
          git add -A
          if git diff --cached --quiet; then
            echo "没有需要保存的更改"
          else
            git commit -m "中文指令执行: ${{ github.event.inputs.command }}"
            git push origin main
            echo "=== 已保存到仓库 ==="
          fi